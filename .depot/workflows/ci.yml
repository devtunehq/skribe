name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  test:
    name: Test
    runs-on: depot-ubuntu-24.04-8
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Chrome
        id: setup-chrome
        uses: browser-actions/setup-chrome@v1

      - name: Link Chrome
        run: sudo ln -sf "${{ steps.setup-chrome.outputs.chrome-path }}" /usr/local/bin/google-chrome

      - name: Show tool versions
        run: |
          node --version
          npm --version
          google-chrome --version

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Fetch main for react-doctor diff
        run: git fetch origin main:main

      - name: React Doctor (diff)
        run: npm run doctor:diff

      - name: Unit tests
        run: npm test

      - name: E2E tests
        run: npm run test:e2e
